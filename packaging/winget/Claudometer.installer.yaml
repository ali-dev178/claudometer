# winget manifest (portable install of the standalone .exe). Version + SHA256 are
# filled by packaging/update-manifests.py. Submit to microsoft/winget-pkgs
# (a three-file manifest is recommended for real submissions; this singleton is a start).
PackageIdentifier: MuhammadAli.Claudometer
PackageVersion: 1.1.13
PackageLocale: en-US
Publisher: Muhammad Ali
PublisherUrl: https://github.com/ali-dev178
PackageName: Claudometer
PackageUrl: https://github.com/ali-dev178/claudometer
License: MIT
LicenseUrl: https://github.com/ali-dev178/claudometer/blob/main/LICENSE
ShortDescription: Live Claude usage limits (session & weekly), always visible on your taskbar.
Moniker: claudometer
Tags:
  - claude
  - claude-code
  - anthropic
  - productivity
  - taskbar
Installers:
  # Point at the Inno installer (ClaudometerSetup.exe) so `winget install` creates
  # real Start-menu/desktop/startup shortcuts — a bare portable .exe would only add
  # a PATH alias, leaving a GUI/tray app with nothing clickable to launch.
  - Architecture: x64
    InstallerType: inno
    Scope: user
    InstallerUrl: https://github.com/ali-dev178/claudometer/releases/download/v1.1.13/ClaudometerSetup.exe
    InstallerSha256: 0110005707B9472E6A225ABD2189C90B46CB8948A015C5E60EDA7183FF4213B2
ManifestType: singleton
ManifestVersion: 1.6.0
