name: Release

# Build standalone binaries + installers, attach them to a GitHub Release, and
# publish to PyPI when you push a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------ #
  # Standalone binaries + native installers (Windows .exe + Inno setup,
  # macOS .app zip + .dmg).
  # ------------------------------------------------------------------ #
  binaries:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: python -m pip install -r requirements-dev.txt

      # ---------------- Windows ----------------
      - name: Build Windows .exe
        if: runner.os == 'Windows'
        run: >
          python -m PyInstaller --onefile --noconsole --name Claudometer
          --icon assets/icon.ico --collect-submodules PIL
          --hidden-import PIL._tkinter_finder app.py

      - name: Build Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $ver = "${{ github.ref_name }}".TrimStart('v')
          if (-not $ver) { $ver = "0.0.0" }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=$ver packaging\windows-installer\claudometer.iss

      - name: Windows checksums
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "## Windows SHA256" >> $env:GITHUB_STEP_SUMMARY
          Get-ChildItem dist\Claudometer.exe, dist\ClaudometerSetup.exe |
            ForEach-Object { "``$((Get-FileHash $_ -Algorithm SHA256).Hash.ToLower())``  $($_.Name)" >> $env:GITHUB_STEP_SUMMARY }

      - name: Upload Windows assets
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Claudometer.exe
            dist/ClaudometerSetup.exe

      # ---------------- macOS ----------------
      - name: Build macOS .app + .zip
        if: runner.os == 'macOS'
        run: |
          python -m PyInstaller --onefile --windowed --name Claudometer \
            --osx-bundle-identifier com.claudometer.app app.py
          /usr/libexec/PlistBuddy -c "Add :LSUIElement bool true" \
            "dist/Claudometer.app/Contents/Info.plist" || true
          cd dist && zip -r Claudometer-macos.zip Claudometer.app

      - name: Build macOS .dmg (drag-to-Applications)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          create-dmg --volname Claudometer --app-drop-link 420 160 \
            --icon Claudometer.app 140 160 --window-size 560 320 \
            dist/Claudometer.dmg dist/Claudometer.app \
            || hdiutil create -volname Claudometer -srcfolder dist/Claudometer.app -ov -format UDZO dist/Claudometer.dmg

      - name: macOS checksums
        if: runner.os == 'macOS'
        run: |
          echo "## macOS SHA256" >> "$GITHUB_STEP_SUMMARY"
          shasum -a 256 dist/Claudometer-macos.zip dist/Claudometer.dmg |
            awk '{print "`"$1"`  "$2}' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload macOS assets
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Claudometer-macos.zip
            dist/Claudometer.dmg

  # ------------------------------------------------------------------ #
  # Publish to PyPI via Trusted Publishing (OIDC) — no API token stored.
  # One-time setup: on PyPI, add this repo + workflow as a trusted publisher
  # for the "claudometer" project. https://docs.pypi.org/trusted-publishers/
  # ------------------------------------------------------------------ #
  pypi:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1

  # ------------------------------------------------------------------ #
  # Point the Scoop / Homebrew / winget manifests at this release and
  # commit them back to main, then push the Homebrew tap cask — so every
  # install channel updates on a tag push with NO manual follow-up.
  #
  # The in-repo manifests use the default GITHUB_TOKEN. The cross-repo tap
  # push needs a PAT in secrets.TAP_TOKEN (fine-grained, Contents:write on
  # ali-dev178/homebrew-claudometer). Without it, the in-repo manifests
  # still update and only the tap step is skipped.
  # ------------------------------------------------------------------ #
  manifests:
    needs: binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fill manifests from the published release assets
        run: python packaging/update-manifests.py ${{ github.ref_name }}

      - name: Commit manifests to main
        run: |
          git config user.name "Muhammad Ali"
          git config user.email "ali.dev178@gmail.com"
          git add packaging/scoop/claudometer.json \
                  packaging/homebrew/claudometer.rb \
                  packaging/winget/Claudometer.installer.yaml
          if git diff --cached --quiet; then
            echo "manifests already current — nothing to commit"
          else
            git commit -m "Point Scoop/Homebrew/winget manifests at ${{ github.ref_name }}"
            git push origin main
          fi

      - name: Update Homebrew tap cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "No TAP_TOKEN secret — skipping tap (add one to automate the cask too)."
            exit 0
          fi
          export GH_TOKEN="$TAP_TOKEN"
          path="repos/ali-dev178/homebrew-claudometer/contents/Casks/claudometer.rb"
          sha=$(gh api "$path" -q .sha)
          gh api -X PUT "$path" \
            -f message="claudometer ${GITHUB_REF_NAME#v}" \
            -f content="$(base64 -w0 packaging/homebrew/claudometer.rb)" \
            -f sha="$sha"
          echo "tap cask updated to ${GITHUB_REF_NAME#v}"
