# Claudometer configuration — OPTIONAL.
# Copy to  ~/.claudometer.toml  (or set CLAUDOMETER_CONFIG=/path/to/file).
# Everything has a sensible default; delete any line to use it. Changes apply
# on restart.

# Seconds between usage polls (clamped to 60–300).
poll = 90

# "auto" follows your taskbar's light/dark; force with "light" or "dark".
theme = "auto"

# Which meters to show on the taskbar strip: any of "session", "weekly".
metrics = ["session", "weekly"]

# Desktop toast alerts when you cross a usage threshold (upward).
alerts = true
alert_thresholds = [80, 90]

# Show an estimated token/cost line in the popover (reads local Claude Code
# session logs; estimate only — see the README).
show_cost = false

# Override the accent color (brand mark, badge, links). Hex string, e.g.:
# accent = "#d97757"

# --- Resume when your 5-hour session limit resets -------------------------
# Tier 1 (safe, default): when the window resets, show a one-click "Resume"
# notification that opens a terminal in your session's folder to continue.
resume_notify = true

# Tier 2 (opt-in, RISKY): automatically resume UNATTENDED at reset — it can make
# changes with no one watching. Off by default. Read the README before enabling.
resume_auto = false
resume_prompt = "Continue where you left off."   # what Tier 2 tells Claude
resume_max_turns = 30                             # Tier 2: cap agentic turns
# resume_skip_permissions = false   # true = --dangerously-skip-permissions
#                                   # (default false uses the safer acceptEdits mode)
